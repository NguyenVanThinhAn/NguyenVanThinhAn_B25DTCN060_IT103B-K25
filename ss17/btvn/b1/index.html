<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Công việc chuẩn bị Tết</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="todo-container">
        <header class="header">
            <h1>Công việc chuẩn bị Tết</h1>
            <p>Quản lý toàn diện danh sách</p>
        </header>

        <div class="stats-section">
            <p>Tổng công việc: 0 | Đã hoàn thành: 0 (100%)</p>
        </div>

        <div class="input-section">
            <input type="text" placeholder="Nhập công việc mới..." class="task-input">
            <button class="btn btn-add">Thêm</button>
            <button class="btn btn-delete-all">Xóa toàn bộ</button>
        </div>

        <main id="task-list">
            
        </main>
    </div>
    <script src="./script.js"></script>
</body>
</html>
