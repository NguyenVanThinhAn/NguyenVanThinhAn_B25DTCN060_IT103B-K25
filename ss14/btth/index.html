<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chợ Tết Online 2026</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <h1>🧧 CHỢ TẾT ONLINE 🧧</h1>
        <p>Sắm sửa đón xuân - Rinh lộc về nhà</p>
    </header>

    <div class="container">
        <div class="left-col">
            <h2>Gian Hàng Tết</h2>
            <div id="product-list" class="grid-container">
                </div>
        </div>

        <div class="right-col">
            <div class="cart-box">
                <h2>🛒 Giỏ Hàng Của Bạn</h2>

                <ul id="cart-list">
                    <li id="empty-msg" class="empty-msg">Chưa có món nào...</li>
                    </ul>

                <div class="cart-summary">
                    <p>Tổng cộng:</p>
                    <h3 id="total-price">0đ</h3>
                    <button id="btn-checkout" class="btn-checkout"
                        onclick="alert('Cảm ơn bạn đã mua hàng! Chúc mừng năm mới!')">Thanh Toán</button>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
