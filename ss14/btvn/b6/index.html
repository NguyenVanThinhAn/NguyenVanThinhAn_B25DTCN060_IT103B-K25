<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Danh Sách Sản Phẩm Chợ Tết</h1>

    <ul id="product-list">
        <!-- Danh sách sản phẩm -->
    </ul>

    <form id="product-form">
        <input type="text" id="product-name" placeholder="Tên sản phẩm">
        <input type="number" id="product-price" placeholder="Giá (VND)">
        <button type="submit">Thêm Sản Phẩm</button>
        <input type="text" id="search-input" placeholder="Tìm kiếm sản phẩm">
        <button type="button" id="sortButton">Sắp xếp sản phẩm theo giá</button>
    </form>
    <script src="./script.js"></script>
</body>
</html>
