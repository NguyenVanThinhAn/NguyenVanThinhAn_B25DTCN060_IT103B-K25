<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <form id="form" action="youtube.com" method="post">
    <caption>Đăng nhập</caption>
    <div>
      <label for="emailInput">Email:</label>
      <input id="emailInput" type="email" placeholder="Nhập email của bạn">
    </div>
    <div>
      <label for="passwordInput">Mật khẩu:</label>
      <input id="passwordInput" type="password" placeholder="Nhập mật khẩu của bạn">
    </div>
    <button id="submitButton" type="submit">Đăng nhập</button>
  </form>

  <script src="./script.js"></script>
</body>
</html>
